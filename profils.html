<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profils — MealFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profils.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .auth-buttons { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 100; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>👤 Profils</h1>
    </div>
    <div class="auth-buttons">
      <div id="google-login-btn"></div>
      <button id="google-logout-btn" type="button" class="btn btn-secondary" onclick="logoutGoogle()" style="display: none;">Logout</button>
    </div>
  </header>

  <main>
    <div style="margin-bottom: 20px; padding: 0 var(--spacing-md);">
      <button id="new-profile-btn" class="btn btn-primary" onclick="openNewProfileModal()">
        ➕ Ajouter un profil
      </button>
    </div>
    <div id="profiles-container" class="profiles-grid">
      <!-- Dynamically populated -->
    </div>
  </main>

  <div id="modal-edit-profile" class="modal-overlay">
    <div class="modal-dialog">
      <button class="modal-close" aria-label="Fermer">&times;</button>
      <h2 id="modal-title">Modification du profil</h2>
      <form id="edit-profile-form" class="edit-profile-form">
        <!-- Name (new profile only) -->
        <div class="form-group" id="field-prenom-group" style="display: none;">
          <label for="field-prenom">Prénom / Nom d'utilisateur</label>
          <input type="text" id="field-prenom" name="Prénom" placeholder="ex. Florian">
        </div>

        <!-- Measurements -->
        <fieldset>
          <legend>Mensurations</legend>
          <div class="form-group">
            <label for="field-taille">Taille (cm)</label>
            <input type="number" id="field-taille" name="Taille_cm" step="0.1" required>
          </div>
          <div class="form-group">
            <label for="field-poids">Poids (kg)</label>
            <input type="number" id="field-poids" name="Poids_kg" step="0.1" required>
          </div>
          <div class="form-group">
            <label for="field-age">Âge (ans)</label>
            <input type="number" id="field-age" name="Âge" required>
          </div>
          <div class="form-group">
            <label for="field-sexe">Sexe</label>
            <select id="field-sexe" name="Sexe" required>
              <option value="">— Sélectionner —</option>
              <option value="M">Homme (M)</option>
              <option value="F">Femme (F)</option>
            </select>
          </div>
        </fieldset>

        <!-- Metabolism -->
        <fieldset>
          <legend>Métabolisme</legend>
          <div class="form-group">
            <label for="field-activite">Activité</label>
            <select id="field-activite" name="Activité" required>
              <option value="">— Sélectionner —</option>
              <option value="Sédentaire">Sédentaire</option>
              <option value="Léger">Léger</option>
              <option value="Modéré">Modéré</option>
              <option value="Actif">Actif</option>
              <option value="Très actif">Très actif</option>
            </select>
          </div>
          <div class="form-group">
            <label for="field-objectif">Objectif</label>
            <select id="field-objectif" name="Objectif" required>
              <option value="">— Sélectionner —</option>
              <option value="Perte agressive">Perte agressive (−750 kcal)</option>
              <option value="Perte modérée">Perte modérée (−500 kcal)</option>
              <option value="Perte légère">Perte légère (−250 kcal)</option>
              <option value="Maintien">Maintien</option>
              <option value="Prise de masse">Prise de masse (+300 kcal)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="field-regime">Régime</label>
            <select id="field-regime" name="Régime" required>
              <option value="">— Sélectionner —</option>
              <option value="Omnivore">Omnivore</option>
              <option value="Végétarien">Végétarien</option>
              <option value="Vegan">Vegan</option>
              <option value="Halal">Halal</option>
              <option value="Kasher">Kasher</option>
              <option value="Sans gluten">Sans gluten</option>
            </select>
          </div>
        </fieldset>

        <!-- Preferences -->
        <fieldset>
          <legend>Préférences culinaires</legend>
          <div class="form-group">
            <label for="field-niveau">Niveau culinaire</label>
            <select id="field-niveau" name="Niveau_culinaire">
              <option value="">— Sélectionner —</option>
              <option value="Débutant">Débutant</option>
              <option value="Intermédiaire">Intermédiaire</option>
              <option value="Expert">Expert</option>
            </select>
          </div>
          <div class="form-group">
            <label for="field-duree">Durée max préparation</label>
            <select id="field-duree" name="Durée_max_prep">
              <option value="">— Sélectionner —</option>
              <option value="Rapide">Rapide (&lt; 15 min)</option>
              <option value="Courte">Courte (15−30 min)</option>
              <option value="Moyenne">Moyenne (30−60 min)</option>
              <option value="Longue">Longue (&gt; 60 min)</option>
            </select>
          </div>
          <div class="form-group">
            <fieldset class="checkbox-group" id="cuisines-group">
              <legend>Cuisines préférées</legend>
              <label><input type="checkbox" name="cuisine-checkbox" value="Méditerranéenne"> Méditerranéenne</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Asiatique"> Asiatique</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Française"> Française</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Italienne"> Italienne</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Espagnole"> Espagnole</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Mexicaine"> Mexicaine</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Indienne"> Indienne</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Japonaise"> Japonaise</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Thaïlandaise"> Thaïlandaise</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Brésilienne"> Brésilienne</label>
              <label><input type="checkbox" name="cuisine-checkbox" value="Aucune préférence"> Aucune préférence</label>
            </fieldset>
          </div>
        </fieldset>

        <!-- Restrictions -->
        <fieldset>
          <legend>Restrictions alimentaires</legend>
          <div class="form-group">
            <label for="field-allergies">Allergies (virgule-séparées)</label>
            <input type="text" id="field-allergies" name="Allergies_JSON" placeholder="ex. Saumon, Kiwi">
          </div>
          <div class="form-group">
            <label for="field-aversions">Aversions (virgule-séparées)</label>
            <input type="text" id="field-aversions" name="Aversions_JSON" placeholder="ex. Olives, Champignons">
          </div>
        </fieldset>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
          <button type="button" class="btn btn-secondary" id="btn-cancel">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <nav class="nav-bottom" aria-label="Navigation principale">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a href="planning.html" class="nav-item">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Planning</span>
    </a>
    <a href="courses.html" class="nav-item">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Courses</span>
    </a>
    <a href="recettes.html" class="nav-item">
      <span class="nav-icon">📖</span>
      <span class="nav-label">Recettes</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaire</span>
    </a>
    <a href="profils.html" class="nav-item active" aria-current="page">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profils</span>
    </a>
  </nav>

  <script src="js/user-context.js"></script>
  <script src="js/google-auth.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/profils.js"></script>
</body>
</html>
