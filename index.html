<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealFlow — Bonjour</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/accueil.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    .auth-buttons { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 100; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🍽️ MealFlow</h1>
    </div>
    <div class="auth-buttons">
      <div id="google-login-btn"></div>
      <button id="google-logout-btn" type="button" class="btn btn-secondary" onclick="logoutGoogle()" style="display: none;">Logout</button>
    </div>
  </header>

  <main class="accueil-main">
    <div class="greeting-section">
      <h2 id="greeting">Chargement...</h2>
      <p id="date-today" class="date-text">Aujourd'hui</p>
      <p id="calorie-objective" class="calorie-text">Objectif: — kcal</p>
    </div>

    <div class="progress-circle-section">
      <svg id="calorie-wheel" class="progress-circle" viewBox="0 0 120 120" aria-label="Calories consommées aujourd'hui" role="img">
        <circle class="circle-bg" cx="60" cy="60" r="54" />
        <circle class="circle-progress" cx="60" cy="60" r="54" id="circle-path" />
        <text class="circle-label" x="60" y="52" id="progress-percent">0%</text>
      </svg>
      <div id="wheel-remaining" style="text-align: center; padding: 8px; font-size: 14px;">Remaining : 0kcal</div>
    </div>
    <div class="actions-section">
      <button id="consommer-btn" class="btn btn-secondary" style="width: 100%;">📦 Consommer</button>
    </div>
    <div class="meals-section">
      <h3>🍽️ Repas du jour</h3>
      <div class="meals-list" id="meals-container">
        <p class="loading-text">Chargement repas du jour...</p>
      </div>
    </div>

    

    <div class="consumption-log-section">
      <h3>📋 Consommations aujourd'hui</h3>
      <table class="consumption-log">
        <thead>
          <tr>
            <th>Heure</th>
            <th>Aliment</th>
            <th>Quantité</th>
            <th>Calories</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="5" style="text-align: center; color: var(--color-text-light);">Aucune consommation</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- TASK 4: Manger Modal -->
  <div id="manger-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>🍽️ Manger</h3>
        <button class="modal-close" id="close-manger-modal">&times;</button>
      </div>
      <form id="manger-form" class="modal-form">
        <label for="manger-meal">Repas:</label>
        <select id="manger-meal" required>
          <option value="">-- Sélectionner --</option>
        </select>

        <label for="manger-qty">Quantité (g):</label>
        <input type="number" id="manger-qty" min="0" step="1" required>

        <div id="manger-preview" class="preview-box"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Soumettre</button>
      </form>
    </div>
  </div>

  <!-- TASK 5: Consommer Modal -->
  <div id="consommer-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📦 Consommer</h3>
        <button class="modal-close" id="close-consommer-modal">&times;</button>
      </div>
      <form id="consommer-form" class="modal-form">
        <label for="consommer-product">Produit:</label>
        <select id="consommer-product" required>
          <option value="">-- Sélectionner --</option>
        </select>

        <label for="consommer-qty">Quantité:</label>
        <input type="number" id="consommer-qty" min="0" step="1" required>

        <div id="consommer-preview" class="preview-box"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Soumettre</button>
      </form>
    </div>
  </div>

  <nav class="nav-bottom" aria-label="Navigation principale">
    <a href="index.html" class="nav-item active" aria-current="page">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a href="planning.html" class="nav-item">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Planning</span>
    </a>
    <a href="recettes.html" class="nav-item">
      <span class="nav-icon">📖</span>
      <span class="nav-label">Recettes</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaire</span>
    </a>
    <a href="profils.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profils</span>
    </a>
  </nav>

  <script src="js/user-context.js"></script>
  <script src="js/google-auth.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/recettes-utils.js"></script>
  <script src="js/recettes.js"></script>
  <script src="js/accueil.js"></script>
  <script src="js/accueil-ui.js"></script>
</body>
</html>
