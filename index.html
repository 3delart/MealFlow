<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealFlow — Bonjour</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/accueil.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <header>
    <div>
      <h1>🍽️ MealFlow</h1>
    </div>
  </header>

  <main class="accueil-main">
    <div class="greeting-section">
      <h2 id="greeting">Chargement...</h2>
      <p id="date-today" class="date-text">Aujourd'hui</p>
      <p id="calorie-objective" class="calorie-text">Objectif: — kcal</p>
    </div>

    <div class="progress-circle-section">
      <svg id="progress-circle" class="progress-circle" viewBox="0 0 120 120" aria-label="Calories consommées aujourd'hui" role="img">
        <circle class="circle-bg" cx="60" cy="60" r="54" />
        <circle class="circle-progress" cx="60" cy="60" r="54" id="circle-path" />
        <text class="circle-label" x="60" y="52" id="progress-percent">0%</text>
        <text class="circle-sublabel" x="60" y="70">consommé</text>
      </svg>
      <p class="circle-caption" id="circle-caption">— / — kcal</p>
    </div>

    <div class="meals-section">
      <div class="grignottage-banner">
        <button id="grignottage-btn" class="btn btn-primary-outline">
          🍪 Grignottage — Scanner
        </button>
      </div>

      <div class="meals-list" id="meals-container">
        <p class="loading-text">Chargement repas du jour...</p>
      </div>

      <div id="scanner-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content">
          <div class="modal-header">
            <h3>Scanner aliment</h3>
            <button class="modal-close" onclick="closeGrignottageModal()">✕</button>
          </div>
          <div id="scanner-container" style="width: 100%; height: 300px;">
            <!-- html5-qrcode scanner inits here -->
          </div>
          <div class="scanner-result hidden" id="scanner-result">
            <p>Aliment trouvé: <strong id="result-name">—</strong></p>
            <p id="result-brand" style="font-size: 0.9em; color: #666; margin: 4px 0;">—</p>
            <p id="result-quantity" style="font-size: 0.85em; color: #999; margin: 4px 0;">—</p>
            <p id="result-category" style="font-size: 0.85em; color: #999; margin: 4px 0;">—</p>
            <p>
              <label for="result-kcal">Calories (kcal):</label>
              <input type="number" id="result-kcal" placeholder="0" min="0" />
            </p>
            <div id="inventory-suggestions" class="inventory-suggestions-container" style="margin-top: 12px; max-height: 200px; overflow-y: auto;"></div>
            <button class="btn btn-primary" onclick="addGrignottage()">Ajouter</button>
            <button class="btn btn-secondary" onclick="restartScanner()">Rescanner</button>
          </div>
        </div>
      </div>
    </div>

    <div class="search-section">
      <input type="text" id="search-meals" placeholder="🔍 Chercher une recette..." autocomplete="off">
      <div id="search-results" class="search-results hidden"></div>
    </div>
  </main>

  <nav class="nav-bottom" aria-label="Navigation principale">
    <a href="index.html" class="nav-item active" aria-current="page">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a href="planning.html" class="nav-item">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Planning</span>
    </a>
    <a href="courses.html" class="nav-item">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Courses</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaire</span>
    </a>
    <a href="profils.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profils</span>
    </a>
  </nav>

  <script src="js/user-context.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/accueil.js"></script>
</body>
</html>
