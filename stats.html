<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistiques — MealFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/stats.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .auth-buttons { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 100; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>📊 Statistiques</h1>
    </div>
    <div class="auth-buttons">
      <div id="google-login-btn"></div>
      <button id="google-logout-btn" type="button" class="btn btn-secondary" onclick="logoutGoogle()" style="display: none;">Logout</button>
    </div>
  </header>

  <main>
    <div class="stats-container">
      <div class="stat-card">
        <h3>Calories Consommées (30 jours)</h3>
        <canvas id="calories-chart"></canvas>
      </div>

      <div class="stat-card">
        <h3>Poids (30 jours)</h3>
        <canvas id="weight-chart"></canvas>
      </div>

      <div class="summary-section">
        <h3>Résumé</h3>
        <div class="summary-grid">
          <div class="summary-item">
            <span class="label">Calories moyennes</span>
            <span id="avg-calories" class="value">—</span>
          </div>
          <div class="summary-item">
            <span class="label">Tendance poids</span>
            <span id="weight-trend" class="value">—</span>
          </div>
          <div class="summary-item">
            <span class="label">Jours complétés</span>
            <span id="days-completed" class="value">—</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="nav-bottom">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a href="planning.html" class="nav-item">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Planning</span>
    </a>
    <a href="courses.html" class="nav-item">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Courses</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaire</span>
    </a>
    <a href="profils.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profils</span>
    </a>
  </nav>

  <script src="js/user-context.js"></script>
  <script src="js/google-auth.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stats.js"></script>
</body>
</html>
