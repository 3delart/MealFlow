<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses — MealFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; }
    main { padding-bottom: 80px; }
    .planning-section { padding: var(--spacing-lg) var(--spacing-md); }

    #week-range-label { text-align: center; font-size: 0.95rem; color: var(--color-text-secondary); margin: 8px 0 8px; font-weight: 500; }
    #loading-state { text-align: center; padding: 40px 20px; color: #999; }

    #progress { text-align: center; color: #4CAF50; font-weight: bold; font-size: 14px; margin: 8px 0 16px; }

    .cat { margin: 16px 0 2px; font-weight: bold; color: #2E7D32; font-size: 13px; padding: 6px 10px; background: #e8f5e9; border-radius: 6px; }
    .cat.in-stock { background: #f0f0f0; color: #999; }
    .cat.custom-cat { background: #FFF3E0; color: #E65100; }

    label { display: flex; align-items: flex-start; padding: 12px 10px; background: white; border-bottom: 1px solid #f0f0f0; font-size: 14px; cursor: pointer; border-radius: 4px; margin: 2px 0; }
    label.dimmed { opacity: 0.6; }
    input[type="checkbox"] { width: 24px; height: 24px; margin-right: 14px; margin-top: 2px; flex-shrink: 0; cursor: pointer; accent-color: #4CAF50; }
    label.done span { text-decoration: line-through; color: #bbb; }
    label.custom-item { position: relative; }

    .del-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #ccc; font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; }
    .del-btn:active { color: #f44336; }

    .add-btn { position: fixed; top: 12px; right: 12px; width: 48px; height: 48px; border-radius: 50%; background: #FF8F00; color: white; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 100; line-height: 1; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 20px; width: 90%; max-width: 340px; }
    .modal h3 { margin: 0 0 16px; color: #333; font-size: 16px; }
    .modal input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; }
    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .modal-btns button { flex: 1; padding: 11px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
    .btn-add { background: #2E7D32; color: white; }
    .btn-cancel { background: #eee; color: #666; }

    .reset { display: block; margin: 20px auto 0; padding: 10px 24px; background: #eee; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: #666; }

    .price-correction { display: flex; align-items: center; gap: 8px; margin-left: 8px; }
    .price-display { font-size: 0.8em; color: #aaa; min-width: 40px; }
    .price-edit-btn { background: #2E7D32; color: white; border: 1px solid #2E7D32; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .price-edit-btn:hover { background: #1b5e20; }

    label.past-day { opacity: 0.6; }
    label.past-day span { text-decoration: line-through; color: #999; }
    label.past-day small { text-decoration: line-through; color: #999; }
    label.past-day div { text-decoration: line-through; color: #999; }

    .auth-buttons { display: flex; gap: 8px; align-items: center; }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal.hidden { display: none; }
    .modal-content { background-color: var(--color-surface); border-radius: var(--border-radius-md); padding: var(--spacing-lg); max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); border-bottom: 1px solid var(--color-border); padding-bottom: var(--spacing-md); }
    .modal-header h3 { margin: 0; font-size: 18px; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--color-text-light); padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { color: var(--color-text); }
    .edit-form { display: flex; flex-direction: column; gap: var(--spacing-md); }
    .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-md); }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 13px; font-weight: 600; color: var(--color-text); }
    .form-group input, .form-group select { padding: 8px 12px; border: 1px solid var(--color-border); border-radius: var(--border-radius-sm); font-size: 14px; font-family: inherit; background-color: var(--color-bg); color: var(--color-text); }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1); }
    .form-group input[readonly] { background-color: var(--color-surface); cursor: not-allowed; opacity: 0.6; }
    .modal-actions { display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg); }
    .modal-actions button { flex: 1; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🛒 Courses</h1>
    </div>
    <div class="auth-buttons">
      <div id="google-login-btn"></div>
      <button id="google-logout-btn" type="button" class="btn btn-secondary" onclick="logoutGoogle()" style="display: none;">Logout</button>
    </div>
  </header>

  <main>
    <section class="planning-section">
      <div id="week-range-label"></div>
      <p id="progress"></p>
      <div id="loading-state">Chargement...</div>
      <div id="courses-list"></div>
      <button class="reset" onclick="location.reload()">Actualiser</button>
    </section>
  </main>

  <button class="add-btn" onclick="showAddModal()">+</button>

  <div class="modal hidden" id="modal-overlay">
    <div class="modal-content" style="max-width:380px;">
      <div class="modal-header">
        <h3>➕ Ajouter un article</h3>
        <button class="modal-close" onclick="hideAddModal()">&times;</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-group" style="position:relative;">
          <label for="item-name">Produit</label>
          <input type="text" id="item-name" placeholder="Rechercher un produit..." autocomplete="off" />
          <div id="custom-item-dropdown" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:4px;max-height:150px;overflow-y:auto;z-index:300;display:none;margin-top:2px;"></div>
        </div>
        <div class="form-group">
          <label for="item-category">Catégorie</label>
          <select id="item-category">
            <option value="Autres">Autres</option>
            <option value="Fruits">Fruits</option>
            <option value="Légumes">Légumes</option>
            <option value="Produits laitiers">Produits laitiers</option>
            <option value="Fromage">Fromage</option>
            <option value="Viandes">Viandes</option>
            <option value="Poissons">Poissons</option>
            <option value="Œufs">Œufs</option>
            <option value="Féculents">Féculents</option>
            <option value="Conserves">Conserves</option>
            <option value="Épices &amp; Condiments">Épices &amp; Condiments</option>
            <option value="Sauces">Sauces</option>
            <option value="Boissons">Boissons</option>
            <option value="Boulangerie &amp; Viennoiserie">Boulangerie &amp; Viennoiserie</option>
            <option value="Apéro">Apéro</option>
            <option value="Vegan">Vegan</option>
            <option value="Bio">Bio</option>
            <option value="Surgelés">Surgelés</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="item-qty">Quantité</label>
            <input type="number" id="item-qty" min="0" step="0.1" placeholder="0" />
          </div>
          <div class="form-group">
            <label for="item-unit">Unité</label>
            <select id="item-unit">
              <option value="g">g</option>
              <option value="ml">ml</option>
              <option value="pièce">pièce</option>
              <option value="litre">litre</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="hideAddModal()">Annuler</button>
          <button class="btn btn-primary" onclick="saveCustomItem()">Ajouter</button>
        </div>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Corriger l'ingrédient</h3>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <form id="edit-form" class="edit-form">
        <div class="form-group">
          <label for="edit-ingredient-name">Ingrédient</label>
          <input type="text" id="edit-ingredient-name" readonly>
        </div>

        <div class="form-group">
          <label for="edit-ingredient-category">Catégorie</label>
          <select id="edit-ingredient-category" required>
            <option value="">— Sélectionner —</option>
            <option value="Fruits & Légumes">Fruits & Légumes</option>
            <option value="Viandes & Charcuterie">Viandes & Charcuterie</option>
            <option value="Produits Vegan">Produits Vegan</option>
            <option value="Poissons">Poissons</option>
            <option value="Cuisine du Monde">Cuisine du Monde</option>
            <option value="Œufs">Œufs</option>
            <option value="Yaourt">Yaourt</option>
            <option value="Fromages">Fromages</option>
            <option value="Conserves">Conserves</option>
            <option value="Produits Secs & Sauces">Produits Secs & Sauces</option>
            <option value="Pain & Viennoiserie">Pain & Viennoiserie</option>
            <option value="Salade & Herbes">Salade & Herbes</option>
            <option value="Autres">Autres</option>
          </select>
        </div>

        <div class="form-group">
          <label for="edit-ingredient-quantity">Quantité nécessaire</label>
          <input type="number" id="edit-ingredient-quantity" min="0" step="0.1" required>
        </div>

        <div class="form-group">
          <label for="edit-ingredient-unit">Unité</label>
          <select id="edit-ingredient-unit" required>
            <option value="">— Sélectionner —</option>
            <option value="g">g (grammes)</option>
            <option value="ml">ml (millilitres)</option>
            <option value="pièce">pièce</option>
            <option value="litre">litre</option>
          </select>
        </div>

        <div class="form-group">
          <label for="edit-ingredient-price">Prix unitaire (€)</label>
          <input type="number" id="edit-ingredient-price" step="0.01" min="0">
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <nav class="nav-bottom" aria-label="Navigation principale">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a href="planning.html" class="nav-item">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Planning</span>
    </a>
    <a href="courses.html" class="nav-item active" aria-current="page">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Courses</span>
    </a>
    <a href="recettes.html" class="nav-item">
      <span class="nav-icon">📖</span>
      <span class="nav-label">Recettes</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaire</span>
    </a>
    <a href="profils.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profils</span>
    </a>
  </nav>

  <script src="js/user-context.js"></script>
  <script src="js/google-auth.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/profile-guard.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/inventory-api.js"></script>
  <script src="js/inventory-data.js"></script>
  <script src="js/recettes-utils.js"></script>
  <script src="js/recettes.js"></script>
  <script src="js/courses.js"></script>
</body>
</html>
