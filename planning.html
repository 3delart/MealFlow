<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning — MealFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/planning.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    .auth-buttons { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 100; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>📅 Planning</h1>
    </div>
    <div class="auth-buttons">
      <div id="google-login-btn"></div>
      <button id="google-logout-btn" type="button" class="btn btn-secondary" onclick="logoutGoogle()" style="display: none;">Logout</button>
    </div>
  </header>

  <main>
    <section class="planning-section">
      <h2>Semaine</h2>
      <div id="meal-plan" class="meal-plan">
        <!-- Dynamically populated -->
      </div>
    </section>

    <!-- Recipe Picker Modal -->
    <div id="recipe-picker-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Sélectionner une recette</h2>
          <button class="btn-close" onclick="closeRecipePickerModal()">✕</button>
        </div>
        <div class="modal-body">
          <input type="text" id="recipe-search-input" class="search-input" placeholder="Rechercher une recette...">
          <div id="recipe-options" class="recipe-options">
            <!-- Dynamically populated -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="nav-bottom" aria-label="Navigation principale">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a href="planning.html" class="nav-item active" aria-current="page">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Planning</span>
    </a>
    <a href="courses.html" class="nav-item">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Courses</span>
    </a>
    <a href="recettes.html" class="nav-item">
      <span class="nav-icon">📖</span>
      <span class="nav-label">Recettes</span>
    </a>
    <a href="inventory.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaire</span>
    </a>
    <a href="profils.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profils</span>
    </a>
  </nav>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/user-context.js"></script>
  <script src="js/google-auth.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/recettes-utils.js"></script>
  <script src="js/recettes.js"></script>
  <script src="js/meal-generation.js"></script>
  <script src="js/planning.js"></script>
</body>
</html>
